#scale up 
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: photo-deployment-hpa
  namespace: chandana-ns
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: photo-deployment
  minReplicas: 1
  maxReplicas: 10
  metrics:
    - type: Resource 
      resource: 
        name: cpu
        target: 
          type: Utilization
          averageUtilization: 5 #5% of cpu utilisation
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 15
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 10
          periodSeconds: 60

  