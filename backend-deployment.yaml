apiVersion: v1
kind: Secret
metadata:
  name: photo-secr
  namespace: chandana-ns
type: Opaque
stringData:
  MONGODB_AUTH_URI: mongodb://mongo-service:27017/artgallery
  MONGODB_FEEDBACK_URI: mongodb://mongo-service:27017/artgallery
  MONGODB_URI: mongodb://mongo-service:27017/artgallery

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb
  namespace: chandana-ns
spec:
  replicas: 1
  selector:
    matchLabels:
      apps: rec-app
  template:
    metadata:
      labels:
        apps: rec-app
    spec:
      containers:
        - name: mongo-container
          image: mongo
          ports:
          - containerPort: 27017
              



---
apiVersion: v1
kind: Service
metadata:
  name: mongo-service
  namespace: chandana-ns
spec:
  selector:
    apps: rec-app
  ports:
  - port: 27017
    targetPort: 27017
  type: ClusterIP


