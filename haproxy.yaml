apiVersion: v1
kind: Deployment
metadata:
  name: haproxy
  namespace: chandana-ns
spec: 
  replicas: 1
  selector:
    matchLabels:
      app: haproxy
  template:
    metadata:
      labels:
        app: haproxy
    spec: 
      containers:
      - name: haproxy
        image: haproxy:latest
        ports:
        - containerPort: 80         
